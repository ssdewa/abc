name: Auto Sync Fork

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get upstream from API
        id: get-upstream
        run: |
          # 自动获取上游仓库
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}")
          
          UPSTREAM=$(echo "$RESPONSE" | jq -r '.parent.full_name // empty')
          
          if [ -n "$UPSTREAM" ] && [ "$UPSTREAM" != "null" ]; then
            echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
            echo "✅ Found upstream: $UPSTREAM"
          else
            echo "❌ Not a fork repository"
            exit 1
          fi

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/${{ steps.get-upstream.outputs.upstream }}.git
          git fetch upstream --force

      - name: Backup workflow files
        run: |
          # 备份 .github 目录下的所有工作流文件
          if [ -d ".github/workflows" ]; then
            mkdir -p /tmp/backup/workflows
            cp -r .github/workflows/* /tmp/backup/workflows/ 2>/dev/null || true
            echo "✅ Backed up workflow files"
          fi

      - name: Sync with upstream (force)
        run: |
          # 获取上游默认分支（main 或 master）
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | cut -d' ' -f5)
          echo "Upstream branch: $UPSTREAM_BRANCH"
          
          # 强制重置到上游分支（完全覆盖本地更改）
          git reset --hard upstream/$UPSTREAM_BRANCH
          echo "✅ Synced with upstream"

      - name: Restore workflow files
        run: |
          # 恢复备份的工作流文件
          if [ -d "/tmp/backup/workflows" ] && [ "$(ls -A /tmp/backup/workflows 2>/dev/null)" ]; then
            # 确保目录存在
            mkdir -p .github/workflows
            
            # 恢复所有备份的文件
            cp -r /tmp/backup/workflows/* .github/workflows/ 2>/dev/null || true
            
            # 添加并提交恢复的文件
            git add .github/workflows/
            git commit -m "chore: restore auto-sync workflow [skip ci]" || echo "No workflow changes to commit"
            
            echo "✅ Restored workflow files"
          else
            echo "ℹ️ No workflow files to restore"
          fi

      - name: Push to origin
        run: |
          # 强制推送到远程（覆盖远程仓库但保留工作流）
          git push origin main --force
          echo "✅ Force synced with upstream (workflows preserved)"

      - name: Create report
        run: |
          echo "## Auto Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Upstream:** ${{ steps.get-upstream.outputs.upstream }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Force synced (workflows preserved)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Latest upstream commit:" >> $GITHUB_STEP_SUMMARY
          git log -1 --pretty=format:"%s" >> $GITHUB_STEP_SUMMARY
